<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Monitor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link rel="stylesheet" href="styles.css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="app.js" defer></script>
</head>
<body>
    <header class="top-bar">
        <div class="brand">
            <h1>Taxi Monitor</h1>
        </div>
        <div class="controls">
            <label>Refresh (s) <input type="number" id="refresh-rate" value="1" min="0.5" step="0.5"></label>
            <button id="btn-apply">Apply</button>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <div class="panel-head">
                <h2>Real-time Map</h2>
                <div class="sub">Beijing (Forbidden City Center)</div>
            </div>
            <div id="map-container" style="height: 500px; width: 100%; background-color: #eee; border-radius: 0 0 4px 4px;"></div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Live Taxis</h2>
                <div class="sub">Color shows proximity to center: green &lt;= 10km, amber 10-15km, red &gt; 15km.</div>
            </div>
            <div id="taxis" class="grid">
                </div>
        </section>

        <section class="panel">
            <div class="panel-head">
                <h2>Alerts</h2>
                <div class="sub">Streaming from LRANGE alerts 0-9 (latest first)</div>
            </div>
            <ul id="alerts-list" class="list">
                </ul>
        </section>
    </main>
</body>
</html>
