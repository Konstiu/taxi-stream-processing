    # ==============================#
    # This is the apache storm      #
    # ==============================#

  zookeeper:
    container_name: zookeeper
    image: zookeeper:3.8
    ports: ["2181:2181"]

  storm-nimbus:
    build:
      context: ./storm
      dockerfile: Dockerfile
    container_name: storm-nimbus
    environment:
      ROLE: nimbus
      KAFKA_BROKERS: broker:29092
      KAFKA_TOPIC: taxi-locations
      KAFKA_GROUP: storm-taxi
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL: 600
    depends_on:
      zookeeper:
        condition: service_started
      broker:
        condition: service_healthy
      redis:
        condition: service_started
    ports: ["6627:6627"]

  storm-supervisor:
    container_name: storm-supervisor
    build:
      context: ./storm
      dockerfile: Dockerfile
    environment:
      ROLE: supervisor
    depends_on:
      storm-nimbus:
        condition: service_started

  storm-ui:
    container_name: storm-ui
    build:
      context: ./storm
      dockerfile: Dockerfile
    environment:
      ROLE: ui
    depends_on:
      storm-nimbus:
        condition: service_started
    ports: ["8080:8080"]

  redis:
    container_name: redis
    image: redis:7-alpine
    ports: ["6379:6379"]
